<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando STEL Bolivia...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060d1a;
            --primary-blue: #0d6efd;
            --primary-bright: #3b8bff;
            --accent-cyan: #0dcaf0;
            --accent-teal: #20c997;
            --text-white: #ffffff;
            --text-muted: #8ab4f8;
            --font-sora: 'Sora', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #0d1a30 0%, #060d1a 55%, #030914 100%);
            font-family: var(--font-sora);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-white);
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Clase para detener animaciones cuando no hay conexión */
        body.offline .spinner-outer,
        body.offline .spinner-middle,
        body.offline .spinner-inner,
        body.offline .spinner-core {
            animation-play-state: paused !important;
        }
        body.offline .scan-line {
            display: none;
        }
        body.offline .dot {
            animation-play-state: paused !important;
            opacity: 0.3;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }
        .ambient-orb--blue {
            width: clamp(250px, 40vw, 500px);
            height: clamp(250px, 40vw, 500px);
            background: rgba(13, 110, 253, 0.18);
            top: -15%;
            left: -10%;
            animation: orb-float-blue 7s ease-in-out infinite alternate;
        }
        .ambient-orb--cyan {
            width: clamp(200px, 35vw, 420px);
            height: clamp(200px, 35vw, 420px);
            background: rgba(13, 202, 240, 0.12);
            bottom: -18%;
            right: -12%;
            animation: orb-float-cyan 8s ease-in-out infinite alternate;
        }
        .ambient-orb--teal {
            width: clamp(180px, 28vw, 350px);
            height: clamp(180px, 28vw, 350px);
            background: rgba(32, 201, 151, 0.09);
            top: 40%;
            left: 55%;
            animation: orb-float-teal 9s ease-in-out infinite alternate;
        }

        @keyframes orb-float-blue {
            0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
            100% { transform: translate(60px, 50px) scale(1.25); opacity: 1; }
        }
        @keyframes orb-float-cyan {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(-50px, -40px) scale(1.3); opacity: 0.9; }
        }
        @keyframes orb-float-teal {
            0% { transform: translate(0, 0) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-30px, 60px) scale(1.2); opacity: 0.8; }
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: clamp(30px, 5vw, 60px) clamp(30px, 5vw, 60px);
            mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, #000 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, #000 30%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(13, 202, 240, 0.5) 20%, rgba(13, 202, 240, 0.9) 50%, rgba(13, 202, 240, 0.5) 80%, transparent 100%);
            z-index: 4;
            pointer-events: none;
            animation: scan-down 4s linear infinite;
            box-shadow: 0 0 20px rgba(13, 202, 240, 0.6), 0 0 40px rgba(13, 202, 240, 0.3);
        }
        @keyframes scan-down {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        .loader-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: clamp(1rem, 3vw, 2.5rem);
            max-width: 500px;
            width: 90%;
            gap: clamp(0.8rem, 2vw, 1.2rem);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: clamp(0.5rem, 1.5vw, 0.85rem);
            margin-bottom: clamp(0.8rem, 2vw, 1.5rem);
            animation: logo-entry 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes logo-entry {
            from { opacity: 0; transform: translateY(-30px) scale(0.9); filter: blur(8px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .logo-icon-wrapper {
            position: relative;
            width: clamp(38px, 7vw, 52px);
            height: clamp(38px, 7vw, 52px);
            flex-shrink: 0;
        }
        .logo-icon-svg {
            width: 100%;
            height: 100%;
            color: var(--primary-bright);
            filter: drop-shadow(0 0 14px rgba(13, 110, 253, 0.8));
            animation: icon-float 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }
        @keyframes icon-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .logo-icon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            border-radius: 50%;
            border: 2px solid rgba(13, 110, 253, 0.35);
            animation: ring-pulse 2.5s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes ring-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        .logo-text {
            font-size: clamp(1.5rem, 4.5vw, 2.6rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 25%, #c8ddf8 50%, #8ab4f8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }
        .logo-text .accent {
            background: linear-gradient(135deg, #3b8bff 0%, #0dcaf0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(13, 110, 253, 0.5));
        }

        .spinner-wrapper {
            position: relative;
            width: clamp(90px, 16vw, 130px);
            height: clamp(90px, 16vw, 130px);
            flex-shrink: 0;
            animation: spinner-entry 0.7s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes spinner-entry {
            from { opacity: 0; transform: scale(0.5) rotate(-30deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .spinner-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.04);
            border-left-color: var(--primary-blue);
            border-right-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1.1s linear infinite;
            box-shadow: 0 0 25px rgba(13, 110, 253, 0.25), inset 0 0 15px rgba(13, 110, 253, 0.05);
        }
        .spinner-middle {
            position: absolute;
            width: 76%;
            height: 76%;
            top: 12%;
            left: 12%;
            border: 2.5px solid rgba(255, 255, 255, 0.03);
            border-top-color: var(--accent-cyan);
            border-bottom-color: var(--accent-teal);
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
            box-shadow: 0 0 18px rgba(13, 202, 240, 0.2);
        }
        .spinner-inner {
            position: absolute;
            width: 52%;
            height: 52%;
            top: 24%;
            left: 24%;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-left-color: var(--primary-bright);
            border-right-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 15px rgba(59, 139, 255, 0.3);
        }
        .spinner-core {
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #ffffff 0%, #b8d4ff 60%, #3b8bff 100%);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 12px #ffffff, 0 0 28px rgba(13, 110, 253, 0.9), 0 0 50px rgba(13, 202, 240, 0.6);
            animation: core-glow 1.4s ease-in-out infinite alternate;
        }
        @keyframes core-glow {
            0% { box-shadow: 0 0 10px #ffffff, 0 0 22px rgba(13, 110, 253, 0.7); transform: translate(-50%, -50%) scale(0.9); }
            100% { box-shadow: 0 0 18px #ffffff, 0 0 35px rgba(13, 110, 253, 1), 0 0 60px rgba(13, 202, 240, 0.8); transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .status-text {
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            font-weight: 500;
            letter-spacing: 0.6px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px rgba(138, 180, 248, 0.3);
            min-height: 1.5em;
            transition: all 0.3s ease;
        }

        .progress-track {
            width: 100%;
            max-width: 380px;
            height: 5px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan), var(--accent-teal), var(--primary-bright));
            background-size: 200% 100%;
            animation: bar-shimmer 2s linear infinite;
            box-shadow: 0 0 14px rgba(13, 110, 253, 0.6);
            border-radius: 20px;
            transition: width 0.08s linear;
        }
        @keyframes bar-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .percentage {
            font-size: clamp(0.8rem, 1.8vw, 0.95rem);
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1.5px;
        }

        .dots-container {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            height: 10px;
        }
        .dot {
            width: 5px;
            height: 5px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: dot-bounce 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(13, 202, 240, 0.7);
        }
        .dot:nth-child(2) { animation-delay: 0.15s; background: var(--primary-bright); }
        .dot:nth-child(3) { animation-delay: 0.3s; background: var(--accent-teal); }
        @keyframes dot-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
            40% { transform: translateY(-8px); opacity: 1; }
        }

        .retry-button {
            display: none;
            margin-top: 0.5rem;
            padding: 0.6rem 1.8rem;
            background: rgba(13, 110, 253, 0.25);
            border: 1px solid rgba(13, 110, 253, 0.5);
            border-radius: 30px;
            color: white;
            font-family: var(--font-sora);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.2);
        }
        .retry-button:hover {
            background: rgba(13, 110, 253, 0.45);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(13, 202, 240, 0.5);
        }

        @media (max-width: 480px) {
            .loader-container { gap: 0.6rem; }
            .spinner-wrapper { width: 80px; height: 80px; }
            .spinner-core { width: 12px; height: 12px; }
            .progress-track { max-width: 280px; height: 4px; }
        }
        @media (max-width: 360px) {
            .spinner-wrapper { width: 68px; height: 68px; }
            .progress-track { max-width: 230px; }
        }
        @media (min-width: 768px) {
            .progress-track { max-width: 420px; height: 6px; }
        }
    </style>
</head>
<body>
    <div class="ambient-orb ambient-orb--blue"></div>
    <div class="ambient-orb ambient-orb--cyan"></div>
    <div class="ambient-orb ambient-orb--teal"></div>
    <div class="bg-grid"></div>
    <div class="scan-line"></div>
    <canvas id="particles-canvas"></canvas>

    <div class="loader-container">
        <div class="logo-container">
            <div class="logo-icon-wrapper">
                <div class="logo-icon-ring"></div>
                <svg class="logo-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                    <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                    <circle cx="12" cy="20" r="1.2"/>
                </svg>
            </div>
            <div class="logo-text">STEL <span class="accent">Bolivia</span></div>
        </div>

        <div class="spinner-wrapper">
            <div class="spinner-outer"></div>
            <div class="spinner-middle"></div>
            <div class="spinner-inner"></div>
            <div class="spinner-core"></div>
        </div>

        <div class="status-text" id="status-text">Conectando al servidor...</div>
        <div class="dots-container" id="dots-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="percentage" id="percentage">0%</div>
        <button class="retry-button" id="retry-button">Reintentar</button>
    </div>

    <script>
        (function() {
            // ================= CONFIGURACIÓN =================
            const TARGET_URL = "frontend/index.html";       // Página de destino (relativa)
            const MAX_RETRIES = 3;
            const RETRY_DELAY = 2500;
            const TOTAL_TIMEOUT = 30000;                    // Timeout global (30s)
            const SESSION_KEY = 'stel_loader_done';
            // ===============================================

            // Construir URL absoluta de destino (soluciona error Invalid base URL)
            const absoluteTargetURL = new URL(TARGET_URL, window.location.href).href;

            const progressBar = document.getElementById('progress-bar');
            const percentageEl = document.getElementById('percentage');
            const statusText = document.getElementById('status-text');
            const dotsContainer = document.getElementById('dots-container');
            const retryButton = document.getElementById('retry-button');
            const body = document.body;

            let realLoadComplete = false;
            let uiFrozen = false;
            let retryCount = 0;
            let totalTimeoutId = null;
            let isLoading = false;           // Reemplaza loadStarted para control de concurrencia

            // === VERIFICACIÓN DE SESIÓN PREVIA ===
            if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                window.location.replace(absoluteTargetURL);
                return;
            }

            function updateProgress(percent, message) {
                if (realLoadComplete || uiFrozen) return;
                const p = Math.min(100, Math.max(0, percent));
                progressBar.style.width = `${p}%`;
                percentageEl.textContent = `${Math.floor(p)}%`;
                if (message) statusText.textContent = message;
            }

            function showRetryButtonOnly() {
                retryButton.style.display = 'inline-block';
                dotsContainer.style.display = 'none';
            }

            function hideRetryButton() {
                retryButton.style.display = 'none';
                dotsContainer.style.display = 'flex';
            }

            function setOfflineState(offline) {
                if (offline) {
                    body.classList.add('offline');
                } else {
                    body.classList.remove('offline');
                }
            }

            // === PRECARGA DE RECURSOS REALES ===
            async function precacheResources() {
                // Etapa 1: Descargar el HTML principal
                updateProgress(5, 'Conectando al servidor...');
                const htmlResponse = await fetchWithTimeout(absoluteTargetURL, {}, 15000);
                if (!htmlResponse.ok) throw new Error(`Error del servidor (${htmlResponse.status})`);
                const htmlText = await htmlResponse.text();
                updateProgress(20, 'Analizando estructura...');

                // Extraer recursos: CSS y JS (rutas relativas convertidas a absolutas)
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const resources = [];

                doc.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('//')) {
                        try {
                            const absolute = new URL(href, absoluteTargetURL).href;
                            resources.push({ url: absolute, type: 'css' });
                        } catch (e) { /* ignorar URLs inválidas */ }
                    }
                });
                doc.querySelectorAll('script[src]').forEach(script => {
                    const src = script.getAttribute('src');
                    if (src && !src.startsWith('http') && !src.startsWith('//')) {
                        try {
                            const absolute = new URL(src, absoluteTargetURL).href;
                            resources.push({ url: absolute, type: 'js' });
                        } catch (e) { /* ignorar */ }
                    }
                });

                // Si no hay recursos, avanzamos directamente
                if (resources.length === 0) {
                    updateProgress(90, 'Preparando interfaz...');
                    return;
                }

                // Obtener tamaños (opcional, para progreso más real)
                let totalSize = 0;
                let loadedSize = 0;
                const resourceInfo = [];

                const headPromises = resources.map(async (res) => {
                    try {
                        const headResp = await fetchWithTimeout(res.url, { method: 'HEAD' }, 5000);
                        if (headResp.ok) {
                            const len = headResp.headers.get('content-length');
                            if (len) {
                                const size = parseInt(len, 10);
                                totalSize += size;
                                resourceInfo.push({ ...res, size });
                                return;
                            }
                        }
                    } catch (e) { /* ignorar */ }
                    // Peso fijo si no se conoce el tamaño
                    resourceInfo.push({ ...res, size: 1 });
                    totalSize += 1;
                });
                await Promise.all(headPromises);

                updateProgress(25, 'Descargando recursos...');

                // Descargar secuencialmente para mostrar progreso real
                for (let i = 0; i < resourceInfo.length; i++) {
                    const res = resourceInfo[i];
                    try {
                        const resp = await fetchWithTimeout(res.url, {}, 10000);
                        if (resp.ok) {
                            await resp.blob(); // Forzar descarga completa
                        }
                    } catch (e) {
                        // Error individual no detiene todo, pero se cuenta como cargado
                    }
                    loadedSize += res.size;
                    const progress = 25 + (loadedSize / totalSize) * 60;
                    updateProgress(progress, `Cargando ${res.type.toUpperCase()} (${i+1}/${resourceInfo.length})...`);
                }

                updateProgress(90, 'Preparando interfaz...');
            }

            // Fetch con timeout
            function fetchWithTimeout(url, options = {}, timeout = 10000) {
                const controller = new AbortController();
                const signal = controller.signal;
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                return fetch(url, { ...options, signal })
                    .finally(() => clearTimeout(timeoutId));
            }

            // === FLUJO PRINCIPAL ===
            async function startRealLoad() {
                if (isLoading || realLoadComplete || uiFrozen) return;
                isLoading = true;
                realLoadComplete = false;
                hideRetryButton();
                setOfflineState(false);
                updateProgress(0, 'Conectando al servidor...');

                // Timeout total
                clearTotalTimeout();
                totalTimeoutId = setTimeout(() => {
                    if (!realLoadComplete && !uiFrozen) {
                        handleFatalError('La carga está tardando demasiado. Intenta de nuevo más tarde.');
                    }
                }, TOTAL_TIMEOUT);

                try {
                    await precacheResources();
                    // Éxito
                    realLoadComplete = true;
                    updateProgress(100, '¡Listo! Bienvenido a STEL Bolivia');
                    sessionStorage.setItem(SESSION_KEY, 'true');
                    clearTotalTimeout();
                    setTimeout(fadeOutAndRedirect, 400);
                } catch (error) {
                    if (uiFrozen) {
                        isLoading = false;
                        return;
                    }
                    retryCount++;
                    if (retryCount <= MAX_RETRIES) {
                        updateProgress(0, `Error: ${error.message}. Reintentando (${retryCount}/${MAX_RETRIES})...`);
                        setOfflineState(true);
                        isLoading = false;  // Importante: liberar para permitir reintento
                        setTimeout(() => {
                            if (!realLoadComplete && !uiFrozen) startRealLoad();
                        }, RETRY_DELAY);
                    } else {
                        handleFatalError('No se pudo cargar la página. Verifica tu conexión e inténtalo manualmente.');
                        isLoading = false;
                    }
                }
            }

            function handleFatalError(message) {
                uiFrozen = true;
                realLoadComplete = false;
                clearTotalTimeout();
                updateProgress(0, message);
                setOfflineState(true);
                showRetryButtonOnly();
                isLoading = false;
            }

            function clearTotalTimeout() {
                if (totalTimeoutId) {
                    clearTimeout(totalTimeoutId);
                    totalTimeoutId = null;
                }
            }

            function fadeOutAndRedirect() {
                document.body.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
                document.body.style.opacity = '0';
                document.body.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    window.location.replace(absoluteTargetURL);
                }, 500);
            }

            // === MANEJO DE CONECTIVIDAD ===
            function handleOnline() {
                if (realLoadComplete || uiFrozen) return;
                if (!isLoading || retryCount > 0) {
                    setOfflineState(false);
                    startRealLoad();
                }
            }

            function handleOffline() {
                if (realLoadComplete || uiFrozen) return;
                setOfflineState(true);
                updateProgress(progressBar.style.width ? parseFloat(progressBar.style.width) : 0, 'Sin conexión a Internet...');
            }

            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);

            // Botón reintentar
            retryButton.addEventListener('click', () => {
                if (uiFrozen) {
                    uiFrozen = false;
                    retryCount = 0;
                    setOfflineState(false);
                    startRealLoad();
                }
            });

            // === PARTÍCULAS (sin cambios) ===
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;

            function resizeCanvas() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * h;
                    this.x = Math.random() * w;
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = h + Math.random() * 60;
                    this.size = Math.random() * 2.2 + 0.6;
                    this.speedY = -(Math.random() * 0.6 + 0.2);
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.7 + 0.2;
                    this.hue = Math.random() < 0.5 ? 200 : 190;
                    this.life = Math.random() * 300 + 200;
                    this.maxLife = this.life;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.life--;
                    if (this.life <= 0 || this.y < -20 || this.x < -20 || this.x > w + 20) {
                        this.reset();
                        this.y = h + Math.random() * 40;
                        this.life = this.maxLife;
                    }
                    let fade = 1;
                    if (this.y < 30) fade = this.y / 30;
                    if (this.y > h - 30) fade = Math.min(fade, (h - this.y) / 30);
                    this.currentOpacity = this.opacity * fade * Math.min(1, this.life / 60);
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    const color = this.hue === 200 ?
                        `hsla(210, 90%, 65%, ${this.currentOpacity})` :
                        `hsla(190, 80%, 60%, ${this.currentOpacity})`;
                    ctx.fillStyle = color;
                    ctx.shadowColor = this.hue === 200 ? 'rgba(13, 110, 253, 0.7)' : 'rgba(13, 202, 240, 0.6)';
                    ctx.shadowBlur = this.size * 5;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function initParticles() {
                const count = Math.floor((w * h) / 11000);
                const targetCount = Math.max(35, Math.min(count, 120));
                particles = [];
                for (let i = 0; i < targetCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                if (!canvas) return;
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 70) {
                            const alpha = (1 - dist / 70) * 0.18;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(138, 180, 248, ${alpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();

            // Arranque inicial
            if (navigator.onLine) {
                setOfflineState(false);
                startRealLoad();
            } else {
                setOfflineState(true);
                updateProgress(0, 'Sin conexión a Internet...');
                showRetryButtonOnly();
            }
        })();
    </script>
</body>
</html>
